name: Build Windows App

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
        pip install -r requirements.txt

    - name: Create default settings.json
      run: |
        echo '{"keys":{"openai":[],"gemini":[],"nvidia":[]},"custom_providers":{},"default_provider":"openai","default_model":"gpt-4o-mini","key_selection_mode":"auto"}' > settings.json
      shell: bash

    - name: Build Executable with PyInstaller
      run: |
        pyinstaller --noconfirm --onedir --windowed --name "SubtitleTranslator" --add-data "core;core" --add-data "ui;ui" --add-data "theme.json;." --add-data "settings.json;." --collect-all imageio_ffmpeg --exclude-module=matplotlib --exclude-module=IPython --exclude-module=pandas --exclude-module=scipy --exclude-module=unittest main.py

    - name: Create ZIP archive
      run: |
        Compress-Archive -Path dist\SubtitleTranslator\* -DestinationPath dist\SubtitleTranslator-Windows.zip
      shell: pwsh

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SubtitleTranslator-Windows
        path: dist/SubtitleTranslator-Windows.zip

    - name: Release (on tag push)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/SubtitleTranslator-Windows.zip
        generate_release_notes: true
